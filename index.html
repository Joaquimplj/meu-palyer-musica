<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>🎵 Meu Top Musical — Andares por Gênero 🎵</title>

    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- Fontes de cada gênero -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:wght@400;600;900&family=Inter:wght@400;500;600;700&family=Josefin+Sans:wght@400;600&family=Oswald:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,500&family=Poppins:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           TEMA POR GÊNERO  —  tudo é controlado por estas variáveis.
           Trocar de aba muda o atributo data-genre no <body> e, com ele,
           todas as cores / fontes / botões / brilhos da página.
           ============================================================ */
        :root {
            --bg: #0c0e1d;
            --bg2: #05060f;
            --accent: #ff8a00;
            --accent2: #e52e71;
            --text: #ffffff;
            --muted: #a0a0d0;
            --font-title: 'Poppins', sans-serif;
            --font-body: 'Poppins', sans-serif;
            --card-bg: rgba(255, 255, 255, 0.12);
            --card-border: rgba(255, 255, 255, 0.25);
            --btn-radius: 50%;
            --glow: rgba(255, 138, 0, 0.55);
        }

        /* 🎷 JAZZ — clube noturno: quente, dourado, elegante */
        body[data-genre="jazz"] {
            --bg: #160f06;
            --bg2: #0a0703;
            --accent: #e0a93b;
            --accent2: #b5651d;
            --text: #f6ecd8;
            --muted: #c2ac84;
            --font-title: 'Playfair Display', serif;
            --font-body: 'Josefin Sans', sans-serif;
            --card-bg: rgba(40, 28, 12, 0.45);
            --card-border: rgba(224, 169, 59, 0.45);
            --btn-radius: 50%;
            --glow: rgba(224, 169, 59, 0.55);
        }

        /* 🎤 HIP HOP — vibe Kanye / Frank Ocean: quente, sóbrio, minimalista.
           Tons terrosos, laranja de pôr-do-sol (Channel Orange / TLOP) e creme,
           tipografia limpa (grotesque). Nada de neon. */
        body[data-genre="hiphop"] {
            --bg: #14110d;
            --bg2: #090706;
            --accent: #e0763a;
            --accent2: #d8c3a5;
            --text: #efe7db;
            --muted: #a89683;
            --font-title: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
            --card-bg: rgba(22, 17, 12, 0.55);
            --card-border: rgba(224, 118, 58, 0.32);
            --btn-radius: 6px;
            --glow: rgba(224, 118, 58, 0.28);
        }

        /* 🎸 ROCK — cru e energético: vermelho/laranja, condensado, agressivo */
        body[data-genre="rock"] {
            --bg: #0c0606;
            --bg2: #000000;
            --accent: #e10600;
            --accent2: #ff7a00;
            --text: #f5f5f5;
            --muted: #c7a3a3;
            --font-title: 'Bebas Neue', sans-serif;
            --font-body: 'Oswald', sans-serif;
            --card-bg: rgba(22, 9, 9, 0.5);
            --card-border: rgba(225, 6, 0, 0.5);
            --btn-radius: 4px;
            --glow: rgba(225, 6, 0, 0.55);
        }

        /* 🇧🇷 NACIONAIS — Brasil (MPB, forró, rap nacional): quente e tropical,
           verde + dourado sóbrios, serifa com personalidade. */
        body[data-genre="nacionais"] {
            --bg: #0f140e;
            --bg2: #070a06;
            --accent: #f2b705;
            --accent2: #1f8a4c;
            --text: #f5efe0;
            --muted: #b3b596;
            --font-title: 'Fraunces', serif;
            --font-body: 'Poppins', sans-serif;
            --card-bg: rgba(18, 26, 16, 0.5);
            --card-border: rgba(242, 183, 5, 0.4);
            --btn-radius: 30px;
            --glow: rgba(242, 183, 5, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            min-height: 100vh;
            overflow-x: hidden;
            scroll-behavior: smooth;
            transition: background 0.6s ease, color 0.4s ease;
        }

        /* ---------------- HEADER + ABAS DE GÊNERO ---------------- */
        .app-header {
            position: relative;
            z-index: 200;
            text-align: center;
            padding: 16px 12px 14px;
            background: linear-gradient(180deg, var(--bg2) 78%, transparent);
            backdrop-filter: blur(10px);
            transition: background 0.6s ease;
        }

        .app-title {
            font-family: var(--font-title);
            font-size: clamp(1.8rem, 5vw, 2.6rem);
            letter-spacing: 1px;
            line-height: 1.1;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
            user-select: none;
            display: inline-block;
        }

        .genre-tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        .genre-tab {
            font-family: var(--font-title);
            font-size: 1rem;
            letter-spacing: 1.5px;
            padding: 9px 20px;
            border-radius: var(--btn-radius);
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(6px);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
        }

        .genre-tab:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .genre-tab.active {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #0a0a0a;
            border-color: transparent;
            box-shadow: 0 6px 22px var(--glow);
        }

        .genre-tagline {
            margin-top: 10px;
            color: var(--muted);
            font-size: 0.98rem;
            min-height: 1.2em;
            font-family: var(--font-body);
        }

        /* ---------------- ANDARES (uma música por tela) ---------------- */
        .floors {
            display: flex;
            flex-direction: column;
        }

        .floor {
            position: relative;
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .floor.in {
            opacity: 1;
            transform: none;
        }

        /* imagem de "cenário" atrás de cada música */
        .floor-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: brightness(0.4) blur(1px);
            transition: filter 0.6s ease;
            z-index: 1;
        }

        .floor:hover .floor-bg {
            filter: brightness(0.6) blur(0);
        }

        .floor-badge {
            position: absolute;
            top: 96px;
            left: 22px;
            z-index: 3;
            font-family: var(--font-title);
            letter-spacing: 2px;
            font-size: 1.1rem;
            background: rgba(0, 0, 0, 0.55);
            padding: 6px 16px;
            border-radius: var(--btn-radius);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(8px);
            text-transform: uppercase;
        }

        .floor-num {
            position: absolute;
            bottom: 22px;
            right: 22px;
            z-index: 3;
            font-family: var(--font-title);
            font-size: 1.4rem;
            letter-spacing: 2px;
            background: rgba(0, 0, 0, 0.55);
            padding: 6px 18px;
            border-radius: var(--btn-radius);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(8px);
            text-transform: uppercase;
        }

        /* ---------------- CARD DA MÚSICA ---------------- */
        .music-card {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 480px;
            padding: 32px;
            text-align: center;
            border-radius: 24px;
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            backdrop-filter: blur(16px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.45);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
        }

        .floor.playing .music-card {
            border-color: var(--accent);
            animation: cardPulse 2.2s ease-in-out infinite;
        }

        @keyframes cardPulse {
            0%, 100% { box-shadow: 0 0 20px var(--glow), 0 0 40px transparent; }
            50%      { box-shadow: 0 0 30px var(--glow), 0 0 70px var(--glow); }
        }

        .album {
            width: 230px;
            height: 230px;
            border-radius: 16px;
            overflow: hidden;
            border: 4px solid var(--card-border);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            margin-bottom: 22px;
            cursor: pointer;
            position: relative;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .album img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            user-select: none;
            pointer-events: none;
        }

        .album.playing {
            animation: spin 12s linear infinite;
            border-color: var(--accent);
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .album .ov {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .album:hover .ov { opacity: 1; }
        .album .ov i { font-size: 3rem; color: #fff; }

        .ph-badge {
            display: inline-block;
            margin-bottom: 12px;
            font-size: 0.72rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--accent);
            border: 1px dashed var(--accent);
            border-radius: 20px;
            padding: 2px 10px;
            font-family: var(--font-body);
        }

        .song-title {
            font-family: var(--font-title);
            font-size: 1.7rem;
            line-height: 1.15;
            margin-bottom: 6px;
        }

        .song-artist {
            color: var(--accent);
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .song-meta {
            color: var(--muted);
            font-size: 0.98rem;
            margin-bottom: 3px;
        }

        .progress {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 3px;
            margin: 20px 0 8px;
            cursor: pointer;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 3px;
            transition: width 0.15s linear;
        }

        .time {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 0.9rem;
            color: var(--muted);
        }

        .controls {
            display: flex;
            gap: 18px;
            justify-content: center;
            margin-top: 20px;
        }

        .cbtn {
            width: 54px;
            height: 54px;
            border-radius: var(--btn-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--card-border);
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .cbtn:hover { transform: scale(1.1); background: rgba(255, 255, 255, 0.18); }

        .play-main {
            width: 68px;
            height: 68px;
            font-size: 1.6rem;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #0a0a0a;
            border: none;
            box-shadow: 0 6px 18px var(--glow);
        }

        /* ---------------- CONTROLES FIXOS ---------------- */
        .side-nav {
            position: fixed;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 150;
        }

        .fbtn {
            width: 50px;
            height: 50px;
            border-radius: var(--btn-radius);
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .fbtn:hover { transform: scale(1.1); border-color: var(--accent); }

        .volume {
            position: fixed;
            left: 18px;
            bottom: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--card-bg);
            padding: 10px 18px;
            border-radius: 30px;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            z-index: 150;
        }

        .vslider {
            width: 110px;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        .vslider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            cursor: pointer;
        }

        .pl-btn {
            position: fixed;
            right: 18px;
            bottom: 18px;
            width: 56px;
            height: 56px;
            border-radius: var(--btn-radius);
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            backdrop-filter: blur(12px);
            z-index: 150;
            transition: all 0.3s ease;
        }

        .pl-btn:hover { transform: scale(1.1); border-color: var(--accent); }

        .current-ind {
            position: fixed;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            z-index: 140;
            font-family: var(--font-title);
            letter-spacing: 1px;
            font-size: 0.95rem;
        }

        footer {
            text-align: center;
            padding: 40px 16px;
            color: var(--muted);
            font-family: var(--font-body);
        }

        /* ---------------- MODAL DA PLAYLIST ---------------- */
        .pl-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .pl-modal.show { opacity: 1; visibility: visible; }

        .pl-box {
            background: rgba(18, 18, 18, 0.96);
            border-radius: 20px;
            width: 90%;
            max-width: 560px;
            max-height: 80vh;
            overflow: hidden;
            border: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
        }

        .pl-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 22px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .pl-head h2 {
            font-family: var(--font-title);
            font-size: 1.4rem;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .pl-close {
            background: none;
            border: none;
            color: #b3b3b3;
            font-size: 1.2rem;
            cursor: pointer;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .pl-close:hover { color: #fff; background: rgba(255, 255, 255, 0.1); }

        .pl-items { padding: 16px; overflow-y: auto; }

        .pl-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pl-item:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }

        .pl-item.playing {
            border-color: var(--accent);
            box-shadow: 0 0 18px var(--glow);
        }

        .pl-item img { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; }
        .pl-item .info { flex: 1; min-width: 0; }
        .pl-item .t { font-family: var(--font-title); color: #fff; font-size: 1.05rem; }
        .pl-item .a { color: #b3b3b3; font-size: 0.88rem; }
        .pl-item .d { color: var(--muted); font-size: 0.85rem; }

        .spotify-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            background: #1db954;
            border-radius: 50%;
            text-decoration: none;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .spotify-link:hover { background: #1ed760; transform: scale(1.12); }
        .spotify-link i { color: #fff; font-size: 18px; }

        /* ---------------- TOAST (avisos sem alert) ---------------- */
        .toast {
            position: fixed;
            left: 50%;
            bottom: 90px;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 0, 0, 0.88);
            color: #fff;
            padding: 12px 22px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            z-index: 3000;
            opacity: 0;
            transition: all 0.3s ease;
            max-width: 90%;
            text-align: center;
            font-family: var(--font-body);
            pointer-events: none;
        }

        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @keyframes partyMode {
            0%, 100% { filter: hue-rotate(0deg); }
            33% { filter: hue-rotate(120deg); }
            66% { filter: hue-rotate(240deg); }
        }

        /* ---------------- RESPONSIVO ---------------- */
        @media (max-width: 768px) {
            .album { width: 190px; height: 190px; }
            .song-title { font-size: 1.45rem; }
            .vslider { width: 80px; }
            .side-nav { right: 12px; }
            .floor-badge { top: 110px; left: 14px; font-size: 0.95rem; }
        }

        @media (max-width: 480px) {
            .music-card { padding: 22px; }
            .album { width: 150px; height: 150px; }
            .volume { padding: 8px 12px; left: 10px; bottom: 10px; }
            .current-ind { display: none; }
        }
    </style>
</head>
<body data-genre="jazz">

    <header class="app-header">
        <h1 class="app-title" id="appTitle">Meu Top Musical</h1>
        <nav class="genre-tabs" id="genreTabs"></nav>
        <p class="genre-tagline" id="genreTagline"></p>
    </header>

    <main class="floors" id="floors"></main>

    <footer id="appFooter"></footer>

    <!-- navegação de rolagem -->
    <div class="side-nav">
        <button class="fbtn" id="upBtn" title="Subir um andar" aria-label="Subir um andar"><i class="fas fa-arrow-up"></i></button>
        <button class="fbtn" id="downBtn" title="Descer um andar" aria-label="Descer um andar"><i class="fas fa-arrow-down"></i></button>
    </div>

    <!-- volume -->
    <div class="volume">
        <i class="fas fa-volume-up" id="volIcon" aria-hidden="true"></i>
        <input type="range" min="0" max="100" value="80" class="vslider" id="volSlider" aria-label="Volume" />
        <span id="volValue">80%</span>
    </div>

    <!-- abrir playlist -->
    <button class="pl-btn" id="plBtn" title="Abrir playlist do gênero" aria-label="Abrir playlist"><i class="fas fa-list"></i></button>

    <!-- indicador do andar atual -->
    <div class="current-ind" id="currentInd">🎷 Jazz — 1/5</div>

    <!-- modal da playlist -->
    <div class="pl-modal" id="plModal">
        <div class="pl-box">
            <div class="pl-head">
                <h2 id="plTitle">🎵 Playlist</h2>
                <button class="pl-close" id="plClose" aria-label="Fechar"><i class="fas fa-times"></i></button>
            </div>
            <div class="pl-items" id="plItems"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        /* ============================================================
           COMO EDITAR AS MÚSICAS
           ------------------------------------------------------------
           Cada gênero tem exatamente 5 músicas no array "songs".
           Campos de cada música:
             title       -> nome da música
             artist      -> artista
             composer    -> compositor (texto livre)
             cover       -> URL da capa (quadrada fica melhor)
             background  -> URL da imagem de "cenário" (fundo da tela)
             duration    -> texto exibido, ex: "4:04"
             totalSeconds-> duração em segundos (para a barra de progresso)
             audioUrl    -> caminho do MP3, ex: "musicas/minha-musica.mp3"
                            (deixe "" se ainda não tiver o arquivo)
             spotifyUrl  -> link do Spotify (ou busca)
             placeholder -> true mostra a etiqueta "sem áudio ainda"
                            (apague esta linha quando adicionar o MP3)

           As marcadas com placeholder ainda não têm MP3 (e algumas usam
           capa/fundo temporários). Coloque o arquivo em musicas/, aponte o
           audioUrl, troque a capa real e apague a linha placeholder.
           ============================================================ */
        const GENRES = {
            jazz: {
                label: "Jazz",
                icon: "🎷",
                tagline: "Noites quentes, sopros suaves e improviso.",
                footer: "Andar do Jazz · feito com ♥ e muito swing",

        const GENRE_ORDER = ["jazz", "hiphop", "rock", "nacionais"];

        /* ---------------- ESTADO ---------------- */
        let activeGenre = "jazz";
        let songs = GENRES[activeGenre].songs;
        let currentSong = -1;
        let isPlaying = false;
        let shuffleMode = false;
        let repeatMode = false;
        const audio = new Audio();

        /* ---------------- ELEMENTOS ---------------- */
        const floorsEl = document.getElementById("floors");
        const tabsEl = document.getElementById("genreTabs");
        const taglineEl = document.getElementById("genreTagline");
        const footerEl = document.getElementById("appFooter");
        const titleEl = document.getElementById("appTitle");
        const currentInd = document.getElementById("currentInd");
        const volSlider = document.getElementById("volSlider");
        const volIcon = document.getElementById("volIcon");
        const volValue = document.getElementById("volValue");
        const plBtn = document.getElementById("plBtn");
        const plModal = document.getElementById("plModal");
        const plClose = document.getElementById("plClose");
        const plItems = document.getElementById("plItems");
        const plTitle = document.getElementById("plTitle");
        const toastEl = document.getElementById("toast");

        /* ---------------- HELPERS ---------------- */
        function fmt(sec) {
            sec = Math.max(0, Math.floor(sec || 0));
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return m + ":" + String(s).padStart(2, "0");
        }

        let toastTimer;
        function toast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add("show");
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toastEl.classList.remove("show"), 3200);
        }

        /* ---------------- ABAS DE GÊNERO ---------------- */
        function renderTabs() {
            tabsEl.innerHTML = "";
            GENRE_ORDER.forEach((key) => {
                const g = GENRES[key];
                const btn = document.createElement("button");
                btn.className = "genre-tab" + (key === activeGenre ? " active" : "");
                btn.dataset.genre = key;
                btn.innerHTML = `<span>${g.icon}</span> ${g.label}`;
                btn.addEventListener("click", () => switchGenre(key));
                tabsEl.appendChild(btn);
            });
        }

        function switchGenre(key) {
            if (key === activeGenre) return;
            stopAll();
            activeGenre = key;
            songs = GENRES[key].songs;
            document.body.dataset.genre = key;
            taglineEl.textContent = GENRES[key].tagline;
            footerEl.textContent = GENRES[key].footer;
            plTitle.textContent = `${GENRES[key].icon} Playlist · ${GENRES[key].label}`;
            document.querySelectorAll(".genre-tab").forEach((t) =>
                t.classList.toggle("active", t.dataset.genre === key)
            );
            renderFloors();
            window.scrollTo({ top: 0, behavior: "smooth" });
            updateCurrentInd();
        }

        /* ---------------- ANDARES ---------------- */
        function renderFloors() {
            floorsEl.innerHTML = "";
            songs.forEach((song, index) => {
                const floor = document.createElement("section");
                floor.className = "floor";
                floor.dataset.index = index;
                floor.innerHTML = `
                    <div class="floor-bg" style="background-image:url('${song.background}')"></div>
                    <span class="floor-badge">${GENRES[activeGenre].icon} ${GENRES[activeGenre].label}</span>
                    <span class="floor-num">Andar ${index + 1}</span>
                    <div class="music-card">
                        <div class="album">
                            <img src="${song.cover}" alt="Capa de ${song.title}" />
                            <div class="ov"><i class="fas fa-play"></i></div>
                        </div>
                        ${song.placeholder ? '<span class="ph-badge">♪ sem áudio ainda</span>' : ""}
                        <h2 class="song-title">${song.title}</h2>
                        <p class="song-artist">${song.artist}</p>
                        <p class="song-meta"><i class="far fa-clock"></i> ${song.duration}</p>
                        <p class="song-meta">Compositor: ${song.composer}</p>
                        <div class="progress"><div class="progress-bar"></div></div>
                        <div class="time"><span class="current-time">0:00</span><span>${song.duration}</span></div>
                        <div class="controls">
                            <button class="cbtn prev-song" aria-label="Anterior"><i class="fas fa-step-backward"></i></button>
                            <button class="cbtn play-main" aria-label="Tocar/Pausar"><i class="fas fa-play"></i></button>
                            <button class="cbtn next-song" aria-label="Próxima"><i class="fas fa-step-forward"></i></button>
                        </div>
                    </div>
                `;
                floorsEl.appendChild(floor);
            });
            setupAnimations();
        }

        /* ---------------- PLAYER ---------------- */
        function floorOf(index) {
            return document.querySelector(`.floor[data-index="${index}"]`);
        }

        function setPlayingUI(index, playing) {
            const floor = floorOf(index);
            if (!floor) return;
            const icon = floor.querySelector(".play-main i");
            const album = floor.querySelector(".album");
            icon.className = playing ? "fas fa-pause" : "fas fa-play";
            album.classList.toggle("playing", playing);
            floor.classList.toggle("playing", playing);
        }

        function resetFloorUI(index) {
            const floor = floorOf(index);
            if (!floor) return;
            floor.querySelector(".play-main i").className = "fas fa-play";
            floor.querySelector(".album").classList.remove("playing");
            floor.classList.remove("playing");
            floor.querySelector(".progress-bar").style.width = "0%";
            floor.querySelector(".current-time").textContent = "0:00";
        }

        function stopAll() {
            audio.pause();
            if (currentSong !== -1) resetFloorUI(currentSong);
            currentSong = -1;
            isPlaying = false;
        }

        function playPause(index) {
            const song = songs[index];

            // mesma música -> alternar play/pause
            if (index === currentSong) {
                if (isPlaying) {
                    audio.pause();
                    isPlaying = false;
                    setPlayingUI(index, false);
                } else {
                    audio.play()
                        .then(() => { isPlaying = true; setPlayingUI(index, true); })
                        .catch(() => toast("Não consegui retomar a reprodução."));
                }
                createPlaylist();
                return;
            }

            // nova música
            if (currentSong !== -1) resetFloorUI(currentSong);
            currentSong = index;

            if (!song.audioUrl) {
                // placeholder sem arquivo
                isPlaying = false;
                setPlayingUI(index, false);
                toast(`Falta o MP3 de "${song.title}". Coloque o arquivo em musicas/ e aponte o audioUrl.`);
                createPlaylist();
                return;
            }

            audio.src = song.audioUrl;
            audio.volume = volSlider.value / 100;
            audio.play()
                .then(() => { isPlaying = true; setPlayingUI(index, true); })
                .catch(() => {
                    isPlaying = false;
                    setPlayingUI(index, false);
                    toast(`Não consegui tocar "${song.title}". Use um servidor local (Live Server) ou o GitHub Pages.`);
                });
            createPlaylist();
        }

        function nextSong() {
            let i;
            if (shuffleMode) {
                do { i = Math.floor(Math.random() * songs.length); }
                while (i === currentSong && songs.length > 1);
            } else {
                i = (currentSong + 1) % songs.length;
            }
            playPause(i);
            scrollToFloor(i);
        }

        function prevSong() {
            let i;
            if (shuffleMode) {
                do { i = Math.floor(Math.random() * songs.length); }
                while (i === currentSong && songs.length > 1);
            } else {
                i = currentSong > 0 ? currentSong - 1 : songs.length - 1;
            }
            playPause(i);
            scrollToFloor(i);
        }

        function scrollToFloor(index) {
            const floor = floorOf(index);
            if (floor) floor.scrollIntoView({ behavior: "smooth", block: "center" });
        }

        // progresso via evento do próprio áudio (sem setInterval acumulando)
        audio.addEventListener("timeupdate", () => {
            if (currentSong === -1) return;
            const floor = floorOf(currentSong);
            if (!floor) return;
            const dur = audio.duration || songs[currentSong].totalSeconds || 0;
            const pct = dur ? (audio.currentTime / dur) * 100 : 0;
            floor.querySelector(".progress-bar").style.width = Math.min(pct, 100) + "%";
            floor.querySelector(".current-time").textContent = fmt(audio.currentTime);
        });

        // duração real quando o áudio carrega (registado UMA vez)
        audio.addEventListener("loadedmetadata", () => {
            if (currentSong === -1) return;
            const song = songs[currentSong];
            song.totalSeconds = audio.duration;
            song.duration = fmt(audio.duration);
            const floor = floorOf(currentSong);
            if (floor) floor.querySelector(".time span:last-child").textContent = song.duration;
        });

        audio.addEventListener("ended", () => {
            if (repeatMode) {
                audio.currentTime = 0;
                audio.play();
            } else {
                nextSong();
            }
        });

        /* ---------------- PLAYLIST (uma só definição) ---------------- */
        function createPlaylist() {
            plItems.innerHTML = "";
            songs.forEach((song, index) => {
                const item = document.createElement("div");
                item.className = "pl-item" + (index === currentSong && isPlaying ? " playing" : "");
                item.innerHTML = `
                    <img src="${song.cover}" alt="${song.title}">
                    <div class="info">
                        <div class="t">${song.title}</div>
                        <div class="a">${song.artist}</div>
                    </div>
                    <div class="d">${song.duration}</div>
                    <a href="${song.spotifyUrl}" target="_blank" rel="noopener" class="spotify-link" title="Abrir no Spotify" aria-label="Abrir no Spotify">
                        <i class="fab fa-spotify"></i>
                    </a>
                `;
                item.addEventListener("click", (e) => {
                    if (e.target.closest(".spotify-link")) return;
                    playPause(index);
                    scrollToFloor(index);
                    plModal.classList.remove("show");
                });
                plItems.appendChild(item);
            });
        }

        /* ---------------- INDICADOR DO ANDAR ATUAL ---------------- */
        function updateCurrentInd() {
            const floors = document.querySelectorAll(".floor");
            const mid = window.scrollY + window.innerHeight / 2;
            const g = GENRES[activeGenre];
            floors.forEach((floor, index) => {
                const top = window.scrollY + floor.getBoundingClientRect().top;
                if (mid >= top && mid <= top + floor.offsetHeight) {
                    currentInd.textContent = `${g.icon} ${g.label} — ${index + 1}/${songs.length}`;
                }
            });
        }

        /* ---------------- ANIMAÇÃO DE ENTRADA ---------------- */
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((e) => { if (e.isIntersecting) e.target.classList.add("in"); });
        }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });

        function setupAnimations() {
            document.querySelectorAll(".floor").forEach((f) => observer.observe(f));
        }

        /* ---------------- EVENTOS GLOBAIS ---------------- */
        floorsEl.addEventListener("click", (e) => {
            const floor = e.target.closest(".floor");
            if (!floor) return;
            const index = parseInt(floor.dataset.index);

            if (e.target.closest(".play-main") || e.target.closest(".album")) {
                playPause(index);
            } else if (e.target.closest(".prev-song")) {
                prevSong();
            } else if (e.target.closest(".next-song")) {
                nextSong();
            } else if (e.target.closest(".progress")) {
                if (currentSong !== index || !songs[index].audioUrl) return;
                const bar = e.target.closest(".progress");
                const rect = bar.getBoundingClientRect();
                const pct = (e.clientX - rect.left) / rect.width;
                audio.currentTime = (audio.duration || songs[index].totalSeconds) * pct;
            }
        });

        document.getElementById("upBtn").addEventListener("click", () =>
            window.scrollBy({ top: -window.innerHeight, behavior: "smooth" }));
        document.getElementById("downBtn").addEventListener("click", () =>
            window.scrollBy({ top: window.innerHeight, behavior: "smooth" }));

        plBtn.addEventListener("click", () => { createPlaylist(); plModal.classList.add("show"); });
        plClose.addEventListener("click", () => plModal.classList.remove("show"));
        plModal.addEventListener("click", (e) => { if (e.target === plModal) plModal.classList.remove("show"); });

        volSlider.addEventListener("input", function () {
            volValue.textContent = this.value + "%";
            audio.volume = this.value / 100;
            volIcon.className = this.value == 0 ? "fas fa-volume-mute"
                : this.value < 50 ? "fas fa-volume-down" : "fas fa-volume-up";
        });

        window.addEventListener("scroll", updateCurrentInd);

        document.addEventListener("keydown", (e) => {
            switch (e.code) {
                case "Space":
                    e.preventDefault();
                    playPause(currentSong === -1 ? 0 : currentSong);
                    break;
                case "ArrowRight": e.preventDefault(); nextSong(); break;
                case "ArrowLeft": e.preventDefault(); prevSong(); break;
                case "ArrowUp": e.preventDefault(); window.scrollBy({ top: -window.innerHeight, behavior: "smooth" }); break;
                case "ArrowDown": e.preventDefault(); window.scrollBy({ top: window.innerHeight, behavior: "smooth" }); break;
                case "KeyS": shuffleMode = !shuffleMode; toast("Modo aleatório: " + (shuffleMode ? "ATIVADO" : "DESATIVADO")); break;
                case "KeyR": repeatMode = !repeatMode; toast("Repetição: " + (repeatMode ? "ATIVADA" : "DESATIVADA")); break;
                case "Digit1": switchGenre("jazz"); break;
                case "Digit2": switchGenre("hiphop"); break;
                case "Digit3": switchGenre("rock"); break;
                case "Digit4": switchGenre("nacionais"); break;
            }
        });

        // easter egg: duplo-clique no título = party mode
        let clicks = 0;
        titleEl.addEventListener("click", () => {
            clicks++;
            if (clicks === 2) {
                document.body.style.animation = "partyMode 0.6s ease-in-out";
                setTimeout(() => (document.body.style.animation = ""), 600);
                clicks = 0;
            }
            setTimeout(() => (clicks = 0), 320);
        });

        /* ---------------- INICIALIZAÇÃO ---------------- */
        function init() {
            document.body.dataset.genre = activeGenre;
            taglineEl.textContent = GENRES[activeGenre].tagline;
            footerEl.textContent = GENRES[activeGenre].footer;
            plTitle.textContent = `${GENRES[activeGenre].icon} Playlist · ${GENRES[activeGenre].label}`;
            renderTabs();
            renderFloors();
            updateCurrentInd();
        }

        init();
    </script>
</body>
</html>
